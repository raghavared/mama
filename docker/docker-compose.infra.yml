version: "3.9"

# Lightweight compose: only Redis + PostgreSQL for local backend development
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mama
      POSTGRES_PASSWORD: mama_password
      POSTGRES_DB: mama_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mama -d mama_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
